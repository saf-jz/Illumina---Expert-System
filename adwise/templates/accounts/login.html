{% extends "base.html" %}
{% load static %}

{% block title %}Login - Illumina{% endblock %}

{% block content %}

<style>
/* Centering */
#login {
  min-height: 75vh;
  display: flex;
  align-items: center;
}

#login .content {
  max-width: 500px;
  margin: 0 auto;
}

/* Labels */
#login .form-label {
  color: #ffffff;
}

/* Inputs base */
#login .form-control {
  background-color: transparent;
  border: 1px solid rgba(255,255,255,0.2);
}

/* Wrapper for icon */
#login .input-wrapper {
  position: relative;
}

/* Input text + spacing */
#login .input-wrapper input {
  padding-right: 40px;
  color:  #ffffff;
}

/* Placeholder red */
#login .input-wrapper input::placeholder {
  color: #e03a3c;
  opacity: 0.7;
}

/* Focus */
#login .input-wrapper input:focus {
  border-color: #e03a3c;
  box-shadow: none;
  background: transparent;
  color: #ffffff;
}

/* Icon inside input */
#login .input-wrapper i {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #e03a3c;
  font-size: 16px;
}

/* Icon turns white on focus */
#login .input-wrapper input:focus + i {
  color: #ffffff;
}

/* 🔥 Button (Explore Services style) */
#login .login-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;

  padding: 10px 28px;

  background: transparent;
  color: #ffffff;

  border: 2px solid #e03a3c;
  border-radius: 50px;

  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.5px;

  cursor: pointer;
  transition: all 0.3s ease;
}

#login .login-btn i {
  font-size: 16px;
}

#login .login-btn:hover {
  background-color: #e03a3c;
  color: #ffffff;
}
</style>

<section id="login" class="about section section-bg dark-background d-flex align-items-center">
  <div class="container position-relative" data-aos="fade-up">

    <div class="row justify-content-center">
      <div class="col-lg-6">

        <div class="content text-center">

          <!-- Title + Icon -->
          <h3 class="mb-4 d-flex align-items-center justify-content-center gap-3">
            <i class="bi bi-person-lock" style="font-size: 26px; color: #e03a3c;"></i>
            <span>Sign in</span>
          </h3>

          {% if error %}
            <div class="alert alert-danger">
              {{ error }}
            </div>
          {% endif %}

          <form method="POST">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-4 text-start">
              <div class="input-wrapper">
                <input type="text" id="username" name="username" class="form-control" placeholder="Username" required>
                <i class="bi bi-person"></i>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4 text-start">
              <div class="input-wrapper">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                <i class="bi bi-lock"></i>
              </div>
            </div>

            <!-- Button -->
            <div class="mt-4">
              <button type="submit" class="login-btn">
                <span>Login</span>
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>

{% endblock %}
